name: Retrain AI Model

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies (no Prophet)
      run: pip install pandas numpy scikit-learn python-dateutil

    - name: Validate AI engine still works
      run: |
        python3 -c "
        import sys
        sys.path.insert(0, 'ai-engine/model')
        from predict import make_scaling_decision
        from datetime import datetime
        d = make_scaling_decision(check_date=datetime(2024, 11, 27), region='US')
        assert d['should_prescale'] == True
        assert d['cost_analysis'] is not None
        print('AI engine validation passed.')
        print(f'Black Friday decision: {d[\"target_replicas\"]} replicas')
        "

    - name: Log retrain status
      run: |
        echo "=============================="
        echo "PeakPilot Model Status"
        echo "=============================="
        echo "Rule-based engine: ACTIVE"
        echo "Prophet training: SKIPPED (CI environment incompatibility)"
        echo "Impact on system: NONE - predict.py uses rule-based calendar"
        echo "=============================="
