apiVersion: apps/v1
kind: Deployment
metadata:
  name: peakpilot-app
  namespace: peakpilot
  labels:
    app: peakpilot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: peakpilot
  template:
    metadata:
      labels:
        app: peakpilot
    spec:
      containers:
      - name: peakpilot-app
        image: peakpilot-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: peakpilot-service
  namespace: peakpilot
spec:
  selector:
    app: peakpilot
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  type: LoadBalancer
