apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: peakpilot-ingress
  namespace: peakpilot
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: peakpilot.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: peakpilot-service
            port:
              number: 80
