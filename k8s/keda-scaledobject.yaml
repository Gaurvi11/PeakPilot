apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: peakpilot-scaler
  namespace: peakpilot
spec:
  scaleTargetRef:
    name: peakpilot-app
  minReplicaCount: 2
  maxReplicaCount: 20
  cooldownPeriod: 300
  triggers:
  - type: cpu
    metricType: Utilization
    metadata:
      value: "60"
